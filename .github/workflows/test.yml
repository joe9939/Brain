name: Brain Agent Tests

on: [push, pull_request]

jobs:
  static-tests:
    name: Static & Circuit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Debug info
        run: |
          node --version
          pwd
          ls -la tests/unit/ | head -10
      - name: Run unit + behavioral tests
        run: node tests/runner.js --unit --bc 2>&1 || echo "EXIT_CODE=$?"
