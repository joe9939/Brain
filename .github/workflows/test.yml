name: Brain Agent Tests

on: [push, pull_request]

jobs:
  static-tests:
    name: Static & Circuit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Debug environment
        run: node -e "console.log('Node', process.version, process.platform, process.arch)"
      - name: Run unit tests
        run: node -e "
          const fs = require('fs');
          const path = require('path');
          const ROOT = path.join(__dirname, 'tests');
          const files = fs.readdirSync(path.join(ROOT, 'unit')).filter(f => f.endsWith('.test.js'));
          console.log('Loading', files.length, 'unit test files...');
          files.forEach(f => { try { require(path.join(ROOT, 'unit', f)); console.log('  OK', f); } catch(e) { console.log('  FAIL', f, e.message); } });
          console.log('All files loaded');
        "
