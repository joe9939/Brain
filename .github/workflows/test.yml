name: Brain Agent Tests

on: [push, pull_request]

jobs:
  static-tests:
    name: Static & Circuit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run unit tests
        run: bun test tests/unit/ tests/circuits/ tests/integration/ tests/e2e/ tests/qc/
      - name: Run E2E keyword checker
        run: node tests/brain-e2e-runner.js
      - name: Run legacy test suite
        run: node tests/runner.js --all

  behavioral-tests:
    name: Behavioral E2E Tests
    runs-on: ubuntu-latest
    needs: [static-tests]
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run Agentest behavioral tests
        run: npx agentest run --config agentest.config.ts
        env:
          AGENTEST_ALLOW_PRIVATE_ENDPOINTS: 1
      - name: Upload behavioral test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentest-results
          path: .agentest/
