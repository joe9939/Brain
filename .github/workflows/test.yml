name: Brain Agent Tests

on: [push, pull_request]

jobs:
  static-tests:
    name: Static & Circuit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run unit tests
        run: node tests/runner.js --unit 2>&1
      - name: Run behavioral tests
        run: node tests/runner.js --bc 2>&1
      - name: Combine results
        if: always()
        run: echo "All test categories completed"
