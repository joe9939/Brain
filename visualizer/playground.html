<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Brain Engine — Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 20px; border-bottom: 1px solid #1a1a3a; display: flex; align-items: center; gap: 10px; background: #0d0d22; }
  #header h1 { font-size: 14px; font-weight: 600; color: #ccccee; }
  #header .badge { font-size: 10px; background: #1a1a3a; color: #6666aa; padding: 2px 8px; border-radius: 4px; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: auto; }
  #status-dot.online { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
  #status-dot.offline { background: #F44336; }
  #status-dot.loading { background: #FF9800; animation: pulse .8s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 13px; white-space: pre-wrap; }
  .msg.user { background: #1a1a4a; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.brain { background: #111130; align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.brain .label { font-size: 10px; color: #5555aa; margin-bottom: 4px; }
  .msg .meta { font-size: 10px; color: #444477; margin-top: 6px; }

  #input-wrap { padding: 12px 20px; border-top: 1px solid #1a1a3a; background: #0d0d22; display: flex; gap: 8px; }
  #input { flex: 1; background: #111130; border: 1px solid #2a2a5a; border-radius: 6px; padding: 10px 14px; color: #e0e0e0; font-size: 13px; outline: none; resize: none; font-family: inherit; }
  #input:focus { border-color: #4444aa; }
  #send { background: #3333aa; border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  #send:hover { background: #4444cc; }
  #send:disabled { opacity: .4; cursor: not-allowed; }

  #welcome { text-align: center; margin: auto; color: #444477; }
  #welcome h2 { font-size: 28px; margin-bottom: 8px; }
  #welcome p { font-size: 13px; line-height: 1.6; }
  #welcome .hint { margin-top: 12px; font-size: 11px; color: #333366; }
</style>
</head>
<body>
<div id="header">
  <h1>🧠 Brain Engine</h1>
  <span class="badge">v2</span>
  <span class="badge">OpenAI-compatible</span>
  <span id="status-dot" class="offline"></span>
</div>

<div id="chat">
  <div id="welcome">
    <h2>🧠</h2>
    <p>Brain Engine v2 — 20 parallel brain regions, 7 competing signals</p>
    <p class="hint">Type a message below to start chatting</p>
  </div>
</div>

<div id="input-wrap">
  <textarea id="input" rows="1" placeholder="Type a message..." style="height:40px"></textarea>
  <button id="send" onclick="send()">Send</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('status-dot');
const apiBase = window.location.origin + '/v1/chat/completions';

let loading = false;

// Auto-resize input
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

function addMessage(role, content, meta) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const el = document.createElement('div');
  el.className = 'msg ' + role;
  if (role === 'brain') {
    el.innerHTML = `<div class="label">🧠 Brain Engine</div>${escapeHtml(content)}`;
  } else {
    el.textContent = content;
  }
  if (meta) {
    el.innerHTML += `<div class="meta">${meta}</div>`;
  }
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
  return el;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || loading) return;

  inputEl.value = '';
  inputEl.style.height = '40px';
  addMessage('user', text);

  loading = true;
  sendBtn.disabled = true;
  statusDot.className = 'loading';

  const msgEl = addMessage('brain', 'Thinking...');

  try {
    const res = await fetch(apiBase, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'brain-engine', messages: [{ role: 'user', content: text }] }),
    });
    const data = await res.json();
    const output = data.choices?.[0]?.message?.content || '(no response)';
    const meta = data.brain_meta
      ? `⚡ ${data.brain_meta.signal} · 🧠 ${data.brain_meta.component} · ⏱ ${data.brain_meta.latency}ms`
      : '';
    msgEl.innerHTML = `<div class="label">🧠 Brain Engine</div>${escapeHtml(output)}` + (meta ? `<div class="meta">${meta}</div>` : '');
  } catch (e) {
    msgEl.innerHTML = `<div class="label">🧠 Brain Engine</div><span style="color:#F44336">Error: ${e.message}</span>`;
  }

  loading = false;
  sendBtn.disabled = false;
  statusDot.className = 'online';
  chatEl.scrollTop = chatEl.scrollHeight;
}

// Health check
(async function() {
  try {
    const res = await fetch(window.location.origin + '/health');
    const data = await res.json();
    if (data.status === 'ok') statusDot.className = 'online';
  } catch { statusDot.className = 'offline'; }
})();
</script>
</body>
</html>
